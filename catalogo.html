<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass PIM - Gestão de Anúncios</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        body { background-color: #09090b; color: #f8fafc; }
        
        .glass-terminal { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .data-dense { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; }
    </style>

    <script src="js/catalogo-logic.js"></script>
</head>
<body class="flex h-screen overflow-hidden selection:bg-indigo-500/30">

    <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-20 lg:w-64 bg-[#09090b] border-r border-white/5 flex flex-col z-20">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-white/5">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(79,70,229,0.5)]"><i class="fas fa-bolt text-sm"></i></div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black text-white">Sóstrass</h1>
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Ads Terminal</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 flex flex-col gap-2">
            <a href="produto-editor.html?id=novo" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition"><i class="fas fa-plus-circle text-lg"></i><span class="hidden lg:block text-xs font-bold">Novo Produto</span></a>
            <a href="catalogo.html" class="flex items-center gap-4 px-4 py-3 bg-white/5 text-white rounded-xl border border-white/10 shadow-inner"><i class="fas fa-layer-group text-indigo-400 text-lg"></i><span class="hidden lg:block text-xs font-bold">Gestão Master</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative z-10 bg-transparent">
        
        <header class="bg-[#09090b]/90 backdrop-blur-xl border-b border-white/5 sticky top-0 z-40">
            <div class="h-6 bg-black border-b border-white/5 overflow-hidden flex items-center px-4">
                <div class="text-[9px] font-mono font-bold text-slate-400 uppercase tracking-widest animate-ticker w-full">
                    <span class="mr-12"><i class="fas fa-circle text-[6px] text-emerald-500 mr-1 animate-pulse"></i> ML API: ONLINE</span>
                    <span class="mr-12"><i class="fas fa-circle text-[6px] text-emerald-500 mr-1 animate-pulse"></i> SHOPEE: ONLINE</span>
                    <span class="mr-12 text-emerald-400"><i class="fas fa-arrow-up mr-1"></i> FATURAMENTO (24H): R$ 14.850,00</span>
                </div>
            </div>

            <div class="px-8 py-4 flex justify-between items-center">
                <div class="flex-1 max-w-xl relative">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-500 text-sm"></i>
                    <input type="text" placeholder="Buscar SKU ou Título..." class="w-full bg-black/50 border border-white/10 rounded-xl pl-10 py-3 text-xs font-bold text-white placeholder:text-slate-600 outline-none focus:border-indigo-500 focus:ring-1 transition-all" oninput="renderTable(this.value)">
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="comandoAcaoGlobal('exportar', this)" class="px-5 py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/10 flex items-center gap-2"><i class="fas fa-file-excel text-emerald-500"></i> Exportar</button>
                    <button onclick="comandoAcaoGlobal('sync', this)" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2"><i class="fas fa-sync-alt"></i> Sync Tudo</button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 scroll-smooth bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-opacity-5">
            
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight uppercase mb-1">Métricas de Anúncios</h2>
                    <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Comparativo D-7 vs Período Anterior</p>
                </div>
            </div>

            <div class="glass-terminal rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                
                <div class="px-6 py-4 border-b border-white/5 bg-black/40 flex gap-2">
                    <button onclick="aplicarFiltro('todos', this)" class="filter-btn active px-4 py-2 bg-indigo-600 text-white rounded-lg text-[10px] font-black uppercase tracking-widest transition">Todos Ativos</button>
                    <button onclick="aplicarFiltro('estoque', this)" class="filter-btn px-4 py-2 bg-white/5 text-slate-400 hover:text-white rounded-lg text-[10px] font-black uppercase tracking-widest transition border border-white/5 flex items-center gap-1.5"><i class="fas fa-exclamation-triangle text-rose-500"></i> Risco de Ruptura</button>
                    <button onclick="aplicarFiltro('vendas', this)" class="filter-btn px-4 py-2 bg-white/5 text-slate-400 hover:text-white rounded-lg text-[10px] font-black uppercase tracking-widest transition border border-white/5 flex items-center gap-1.5"><i class="fas fa-fire text-amber-500"></i> Best Sellers</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-[#050507] border-b border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-500">
                            <tr>
                                <th class="px-6 py-4">Produto</th>
                                <th class="px-6 py-4 w-48">Estoque Atual</th>
                                <th class="px-6 py-4">Mercado (BuyBox)</th>
                                <th class="px-6 py-4 bg-white/[0.02]">Performance (Visitas / Vendas)</th>
                                <th class="px-6 py-4 text-center">Saúde</th>
                                <th class="px-6 py-4 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="terminal-body" class="divide-y divide-white/5 data-dense">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</body>
</html>
