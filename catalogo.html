<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass PIM - Terminal de Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        body { background-color: #050507; color: #f8fafc; }
        
        /* Efeitos Hardcore Terminal */
        .glass-terminal { background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(32px); border: 1px solid rgba(255,255,255,0.05); }
        .text-glow-green { text-shadow: 0 0 10px rgba(52, 211, 153, 0.6); }
        .text-glow-red { text-shadow: 0 0 10px rgba(244, 63, 94, 0.6); }
        
        /* Ticker Animado (Letreiro da Bolsa) */
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; }
    </style>

    <script src="js/banco.js"></script>
    <script src="js/funcoes.js"></script>
</head>
<body class="flex h-screen overflow-hidden selection:bg-indigo-500/30">

    <div class="absolute top-[-20%] right-[-10%] w-[60%] h-[60%] bg-indigo-900/20 rounded-full blur-[150px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-20%] left-[-10%] w-[60%] h-[60%] bg-emerald-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <aside class="w-20 lg:w-64 bg-[#050507]/95 border-r border-white/5 flex flex-col z-20">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-white/5">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-blue-800 flex items-center justify-center text-white shadow-[0_0_20px_rgba(79,70,229,0.4)]"><i class="fas fa-gem text-sm"></i></div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black tracking-tight text-white leading-none">Sóstrass</h1>
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mt-0.5">Terminal PIM</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 flex flex-col gap-2">
            <a href="cockpit.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition"><i class="fas fa-chart-line text-lg"></i><span class="hidden lg:block text-xs font-bold">Cockpit</span></a>
            <a href="catalogo.html" class="flex items-center gap-4 px-4 py-3 bg-white/5 text-white rounded-xl border border-white/10 shadow-inner"><i class="fas fa-list-ul text-indigo-400 text-lg"></i><span class="hidden lg:block text-xs font-bold">Ativos (Catálogo)</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative z-10">
        
        <header class="bg-[#09090b]/90 backdrop-blur-xl border-b border-white/5 sticky top-0 z-40 flex flex-col">
            <div class="h-6 bg-black/60 border-b border-white/5 overflow-hidden flex items-center px-4 relative">
                <div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-[#09090b] to-transparent z-10"></div>
                <div class="text-[9px] font-mono font-bold text-slate-400 uppercase tracking-widest animate-ticker w-full">
                    <span class="mr-8"><i class="fas fa-circle text-[6px] text-emerald-500 mr-1 animate-pulse"></i> SHOPEE API: ONLINE (99.8%)</span>
                    <span class="mr-8"><i class="fas fa-circle text-[6px] text-emerald-500 mr-1 animate-pulse"></i> MERCADO LIVRE: ONLINE (100%)</span>
                    <span class="mr-8"><i class="fas fa-circle text-[6px] text-amber-500 mr-1 animate-pulse"></i> BLING: SYNC QUEUE (2 ITEMS)</span>
                    <span class="mr-8 text-emerald-400"><i class="fas fa-arrow-up mr-1"></i> FATURAMENTO HOJE: R$ 14.850,00</span>
                </div>
            </div>

            <div class="px-8 py-4 flex justify-between items-center">
                <div class="flex-1 max-w-xl relative">
                    <i class="fas fa-search absolute left-4 top-3 text-slate-500 text-sm"></i>
                    <input type="text" placeholder="Buscar Ativos (SKU, NCM, Título)..." class="w-full bg-black/40 border border-white/10 rounded-lg pl-10 py-2.5 text-xs font-bold text-white placeholder:text-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all shadow-inner" oninput="renderTerminal(this.value)">
                </div>
                <div class="flex items-center gap-4 ml-4">
                    <button class="w-9 h-9 rounded-lg border border-white/10 flex items-center justify-center text-slate-400 hover:bg-white/5 transition"><i class="fas fa-filter"></i></button>
                    <a href="produto-editor.html?id=novo" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black uppercase tracking-widest shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all flex items-center gap-2"><i class="fas fa-plus"></i> Novo Ativo</a>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 scroll-smooth" id="terminal-root">
            </main>
    </div>

    <script>
        const f2 = n => parseFloat(n||0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        // Mini Gráfico em SVG (Sparkline simulado de tendência de vendas)
        const getSparkline = (trend) => {
            const isUp = trend === 'up';
            const color = isUp ? '#34d399' : '#f43f5e'; // Emerald ou Rose
            const path = isUp ? 'M0 20 Q 10 15, 20 18 T 40 10 T 60 5 L 60 25 L 0 25 Z' : 'M0 5 Q 10 10, 20 8 T 40 15 T 60 20 L 60 25 L 0 25 Z';
            const line = isUp ? 'M0 20 Q 10 15, 20 18 T 40 10 T 60 5' : 'M0 5 Q 10 10, 20 8 T 40 15 T 60 20';
            
            return `
            <svg width="60" height="25" viewBox="0 0 60 25" class="drop-shadow-md">
                <defs><linearGradient id="grad${trend}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
                <path d="${path}" fill="url(#grad${trend})" />
                <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" />
            </svg>`;
        };

        function renderTerminal(filtro = '') {
            const root = document.getElementById('terminal-root');
            const prods = typeof products !== 'undefined' ? products : [];
            
            // Header Dinâmico de Resultados
            let html = `
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-white tracking-tighter uppercase mb-1">Listagem de Ativos</h2>
                        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Painel de Cotações e Saúde do Catálogo Bling</p>
                    </div>
                </div>
                
                <div class="glass-terminal rounded-2xl overflow-hidden shadow-2xl flex flex-col border border-white/10">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left whitespace-nowrap border-collapse">
                            <thead class="bg-black/60 border-b border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-400">
                                <tr>
                                    <th class="px-6 py-4">Ativo (SKU / Produto)</th>
                                    <th class="px-6 py-4">Cotação (R$)</th>
                                    <th class="px-6 py-4">Performance (Margem)</th>
                                    <th class="px-6 py-4 text-center">Canais</th>
                                    <th class="px-6 py-4 text-center">Saúde / Sync</th>
                                    <th class="px-6 py-4 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5 bg-transparent tabular-nums">
            `;

            if(prods.length === 0) {
                html += `<tr><td colspan="6" class="p-10 text-center text-slate-500 font-mono text-xs">NENHUM ATIVO ENCONTRADO NO BANCO DE DADOS.</td></tr>`;
            }

            prods.filter(p => p.sku.toLowerCase().includes(filtro.toLowerCase()) || p.name.toLowerCase().includes(filtro.toLowerCase())).forEach((p) => {
                
                const base = typeof getBase === 'function' ? getBase(p) : (p.cost || 0);
                const marg = typeof calcMargin === 'function' ? calcMargin(p.price, base) : 0;
                
                // Lógica Hardcore de Cores do Mercado
                const isLucro = marg >= 30;
                const margColor = isLucro ? 'text-emerald-400 text-glow-green' : 'text-rose-400 text-glow-red';
                const margBg = isLucro ? 'bg-emerald-500/10 border-emerald-500/20' : 'bg-rose-500/10 border-rose-500/20';
                const trend = isLucro ? 'up' : 'down';

                // Status Bling
                const syncBadge = p.pendenteBling 
                    ? `<div class="flex items-center gap-1.5 text-[9px] font-bold text-amber-500 bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20 animate-pulse"><i class="fas fa-sync-alt fa-spin"></i> SYNC PENDENTE</div>`
                    : `<div class="flex items-center gap-1.5 text-[9px] font-bold text-slate-400 bg-white/5 px-2 py-1 rounded border border-white/10"><i class="fas fa-check text-emerald-500"></i> BLING OK</div>`;

                // Saúde Fake SEO Circle
                const seoScore = ((p.desc?.length > 30 ? 30:0) + (p.descComp?.length > 200 ? 40:0) + (p.ean?.length >= 8 ? 30:0)) || 85;
                const seoColor = seoScore > 80 ? 'text-emerald-500' : 'text-amber-500';

                // Canais
                let platsHtml = p.platforms?.length > 0 
                    ? p.platforms.map(plId => `<div class="w-6 h-6 rounded bg-white/10 flex items-center justify-center text-xs border border-white/5 shadow-inner" title="${plId}">${typeof PSVG !== 'undefined' ? PSVG[plId] : plId.charAt(0)}</div>`).join('')
                    : `<span class="text-[9px] text-slate-600 font-bold">N/A</span>`;

                html += `
                    <tr class="hover:bg-white/[0.02] transition-colors group cursor-pointer" onclick="window.location.href='produto-editor.html?id=${p.id}'">
                        
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-lg bg-black/50 border border-white/10 overflow-hidden shrink-0 flex items-center justify-center shadow-inner group-hover:border-indigo-500/50 transition-colors">
                                    <i class="fas fa-box text-slate-600 text-lg"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-black text-white tracking-tight group-hover:text-indigo-400 transition-colors">${p.sku}</span>
                                    <span class="text-[10px] font-bold text-slate-500 truncate w-64">${p.name}</span>
                                </div>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex flex-col">
                                <span class="text-sm font-black text-white">R$ ${f2(p.price)}</span>
                                <span class="text-[9px] font-mono text-slate-500">Base: R$ ${f2(base)}</span>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex items-center gap-4">
                                ${getSparkline(trend)}
                                <span class="px-2 py-1 rounded-md text-[10px] font-black border ${margBg} ${margColor}">
                                    ${marg.toFixed(1)}%
                                </span>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex items-center justify-center gap-1">
                                ${platsHtml}
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex flex-col items-center justify-center gap-2">
                                ${syncBadge}
                                <div class="flex items-center gap-2" title="Health Score SEO">
                                    <svg width="14" height="14" viewBox="0 0 36 36" class="transform -rotate-90">
                                        <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"></circle>
                                        <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="${100 - seoScore}" class="${seoColor}"></circle>
                                    </svg>
                                    <span class="text-[9px] font-black ${seoColor}">${seoScore}</span>
                                </div>
                            </div>
                        </td>

                        <td class="px-6 py-4 text-right">
                            <a href="produto-editor.html?id=${p.id}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-white/5 border border-white/10 text-slate-400 hover:bg-indigo-600 hover:text-white hover:border-indigo-500 transition-all shadow-sm group-hover:scale-110" title="Abrir Editor Master">
                                <i class="fas fa-edit"></i>
                            </a>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            root.innerHTML = html;
        }

        window.onload = () => { renderTerminal(); };
    </script>
</body>
</html>
