<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass PIM - Terminal Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="js/banco.js"></script>
    <script src="js/funcoes.js"></script>
    <script src="js/catalogo-logic.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        
        .animate-ticker { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .tabular { font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-50 dark:bg-[#050507] text-slate-800 dark:text-slate-200">

    <aside class="w-20 lg:w-64 bg-white dark:bg-[#09090b] border-r border-slate-200 dark:border-white/5 flex flex-col z-30 transition-all">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-slate-200 dark:border-white/5">
            <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-lg"><i class="fas fa-gem"></i></div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black dark:text-white">Sóstrass</h1>
                <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">Enterprise PIM</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-2">
            <a href="cockpit.html" class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-indigo-50 dark:hover:bg-white/5 rounded-xl transition group"><i class="fas fa-chart-pie"></i><span class="hidden lg:block text-xs font-bold">Dashboard</span></a>
            <a href="catalogo.html" class="flex items-center gap-4 px-4 py-3 bg-indigo-600 text-white rounded-xl shadow-indigo-500/20 shadow-lg"><i class="fas fa-layer-group"></i><span class="hidden lg:block text-xs font-bold">Anúncios Master</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative">
        
        <header class="bg-white/80 dark:bg-[#09090b]/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/5 sticky top-0 z-40">
            <div class="h-7 bg-slate-100 dark:bg-black border-b border-slate-200 dark:border-white/5 overflow-hidden flex items-center relative">
                <div class="text-[10px] font-mono font-bold text-slate-500 dark:text-slate-400 uppercase animate-ticker w-full" id="ticker-content">
                    </div>
            </div>

            <div class="px-8 py-5 flex justify-between items-center">
                <div class="flex-1 max-w-2xl relative">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                    <input type="text" placeholder="Filtrar Terminal (SKU, Nome, EAN)..." class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl pl-12 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500 transition-all outline-none" oninput="renderTerminal(this.value)">
                </div>

                <div class="flex items-center gap-4 ml-6">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-white/10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/10 transition shadow-sm">
                        <i class="fas fa-sun dark:hidden text-amber-500"></i>
                        <i class="fas fa-moon hidden dark:block text-indigo-400"></i>
                    </button>
                    <button onclick="exportData()" class="px-5 py-3 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-white/10 transition flex items-center gap-2"><i class="fas fa-file-export text-emerald-500"></i> Planilha</button>
                    <button class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-500/30 transition-all flex items-center gap-2"><i class="fas fa-sync-alt"></i> Sincronizar Canais</button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 scroll-smooth">
            <div id="kpi-blocks" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">
                </div>

            <div class="bg-white dark:bg-[#0b0b0d] border border-slate-200 dark:border-white/5 rounded-3xl overflow-hidden shadow-2xl flex flex-col">
                <div class="px-6 py-4 border-b border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-black/40 flex justify-between items-center">
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-[10px] font-black uppercase">Todos Ativos</button>
                        <button class="px-4 py-2 bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-white/10 rounded-lg text-[10px] font-black uppercase hover:border-indigo-500 transition">Baixo Estoque</button>
                    </div>
                    <span class="text-[10px] font-mono font-bold text-slate-400">DATA FEED: LIVE</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 dark:bg-black border-b border-slate-200 dark:border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-400">
                            <tr>
                                <th class="px-6 py-5">Produto</th>
                                <th class="px-6 py-5">Performance Global (8 Canais)</th>
                                <th class="px-6 py-5">BuyBox & Mercado</th>
                                <th class="px-6 py-5">Analytics (D-7)</th>
                                <th class="px-6 py-5 text-center">Saúde SEO</th>
                                <th class="px-6 py-5 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="terminal-body" class="divide-y divide-slate-100 dark:divide-white/5 tabular">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('pim_theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('pim_theme') === 'light') document.documentElement.classList.remove('dark');
        
        window.onload = () => { renderTicker(); renderKPIs(); renderTerminal(); };
    </script>
</body>
</html>
