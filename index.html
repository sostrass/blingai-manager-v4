<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass AI Enterprise v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Glassmorphism & Enterprise UI */
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .ios-input { background: rgba(241, 245, 249, 0.7); border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; transition: all 0.2s; outline: none; color: #1e293b; font-size: 13px; }
        .ios-input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        
        /* Animations */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        
        /* Drag & Drop Panels (Modal) */
        .drag-panel { transition: border-color 0.15s, opacity 0.15s; }
        .drag-panel.dragging { opacity: 0.5; border: 2px dashed #6366f1; }
        .dp-handle { cursor: grab; user-select: none; }
        .dp-handle:active { cursor: grabbing; }

        /* Tooltips */
        .tip { position: relative; display: inline-flex; }
        .tip .tip-text { display: none; position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #cbd5e1; z-index: 200; line-height: 1.5; min-width: 200px; white-space: normal; pointer-events: none; text-align: center; }
        .tip:hover .tip-text { display: block; }
        .tip-icon { width: 14px; height: 14px; border-radius: 50%; background: rgba(99,102,241,0.1); color: #6366f1; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; cursor: help; margin-left: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-3"></div>

    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col shadow-2xl z-20 shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-950">
            <h1 class="text-lg font-bold text-white tracking-wider flex items-center gap-2">
                <i class="fas fa-gem text-indigo-500"></i> Sóstrass<span class="text-xs font-normal text-indigo-400 border border-indigo-500/30 px-1.5 rounded bg-indigo-500/10">PRO</span>
            </h1>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Operacional</p>
            <button onclick="navTo('catalogo')" id="nav-catalogo" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 text-white bg-indigo-600 rounded-lg font-medium transition shadow-lg shadow-indigo-900/20 active">
                <i class="fas fa-box-open w-5 text-center"></i> Catálogo ERP
            </button>
            <button onclick="navTo('massa')" id="nav-massa" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-bolt text-amber-400 w-5 text-center"></i> Op. em Massa
            </button>
            <button onclick="navTo('automacoes')" id="nav-automacoes" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-robot text-emerald-400 w-5 text-center"></i> Central de I.A.
            </button>

            <div class="my-4 border-t border-slate-800"></div>
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Estratégia & Sistema</p>
            <button onclick="navTo('simulador')" id="nav-simulador" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-globe w-5 text-center"></i> Precificação Global
            </button>
            <button onclick="navTo('log')" id="nav-log" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-clipboard-list w-5 text-center"></i> Log de Atividades <span id="logBadge" class="hidden ml-auto bg-rose-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold"></span>
            </button>
            <button onclick="navTo('config')" id="nav-config" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-cog w-5 text-center"></i> Configurações
            </button>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-950">
            <button onclick="sincronizarBling()" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg transition text-sm font-bold shadow-md">
                <i class="fas fa-sync-alt"></i> Puxar do Bling
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative">
        
        <header class="h-16 glass-panel flex items-center justify-between px-8 z-10 sticky top-0 border-b border-slate-200">
            <div class="flex-1 max-w-2xl flex items-center relative">
                <i class="fas fa-search absolute left-4 text-slate-400"></i>
                <input type="text" id="buscaUniversal" placeholder="Buscar por SKU, nome ou código de barras..." class="w-full ios-input pl-11" oninput="filtrarGeral(this.value)">
            </div>
            <div class="flex items-center gap-4 ml-6">
                <div id="serverBar" class="flex items-center gap-2 text-xs font-bold text-amber-700 bg-amber-100 px-3 py-1.5 rounded-full border border-amber-200 shadow-inner transition-colors">
                    <i class="fas fa-circle-notch fa-spin"></i> Conectando Proxy...
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-8 relative" id="main-container">
            
            </main>
    </div>
    
    </body>
</html>
