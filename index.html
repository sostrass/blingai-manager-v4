<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingAI Manager v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Suaviza a abertura do painel lateral */
        .drawer-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-layer-group"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">BlingAI Manager <span class="text-indigo-600 text-sm align-top">v4</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="flex items-center gap-2 text-sm font-medium text-slate-600">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Servidor Online
            </span>
            <div class="h-8 w-8 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-500">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-8">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Catálogo Dinâmico</h2>
                    <p class="text-sm text-slate-500 mt-1">Monitoramento de margem e automação de descritivos.</p>
                </div>
                <button class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg shadow-sm hover:bg-slate-50 transition text-sm font-medium">
                    <i class="fas fa-sync-alt mr-2 text-slate-400"></i> Sincronizar Bling
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 font-semibold">
                        <tr>
                            <th class="px-6 py-4"><input type="checkbox" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"></th>
                            <th class="px-6 py-4">SKU / Produto</th>
                            <th class="px-6 py-4">Custo</th>
                            <th class="px-6 py-4">Preço Atual</th>
                            <th class="px-6 py-4">Margem</th>
                            <th class="px-6 py-4">Status no Mercado</th>
                            <th class="px-6 py-4 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-produtos" class="divide-y divide-slate-100">
                        <tr><td colspan="7" class="text-center py-8 text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> Carregando bolsa de valores...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <div id="drawer-ia" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl transform translate-x-full drawer-transition z-50 border-l border-slate-200 flex flex-col">
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 class="text-lg font-bold text-slate-800"><i class="fas fa-robot text-indigo-500 mr-2"></i> Automação de I.A.</h3>
            <button onclick="fecharDrawer()" class="text-slate-400 hover:text-slate-600 p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="p-6 flex-1 overflow-auto">
            <div class="mb-6">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Produto Selecionado</span>
                <p id="drawer-nome-produto" class="text-slate-900 font-medium text-lg mt-1">-</p>
                <p id="drawer-sku" class="text-slate-500 text-sm">-</p>
            </div>

            <button onclick="gerarDescricaoIA()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg shadow-sm transition flex justify-center items-center gap-2 mb-8">
                <i class="fas fa-sparkles text-amber-300"></i> Gerar Ficha Técnica Extrema
            </button>

            <div id="skeleton-loader" class="hidden animate-pulse space-y-4">
                <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                <div class="h-4 bg-slate-200 rounded w-full"></div>
                <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                <div class="h-4 bg-slate-200 rounded w-full"></div>
                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
            </div>

            <div id="resultado-ia" class="hidden">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider"><i class="fas fa-check-circle mr-1"></i> Texto Gerado</span>
                    <button class="text-indigo-600 text-xs font-medium hover:underline"><i class="far fa-copy mr-1"></i>Copiar</button>
                </div>
                <div id="texto-gerado" class="bg-slate-50 border border-slate-200 p-4 rounded-lg text-sm text-slate-700 whitespace-pre-wrap leading-relaxed h-64 overflow-y-auto font-mono"></div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="fecharDrawer()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden transition-opacity"></div>

    <script>
        let produtoAtual = null;

        // 1. Carregar dados no Data Grid
        async function carregarProdutos() {
            try {
                const response = await fetch('/api/produtos/monitoramento');
                const data = await response.json();
                
                const tbody = document.getElementById('tabela-produtos');
                tbody.innerHTML = ''; // Limpa o carregando

                data.dados.forEach(prod => {
                    // Lógica para cor das Badges
                    let badgeClass = "bg-slate-100 text-slate-700";
                    let iconeBadge = "";
                    if(prod.status.includes('Lucro Ideal')) { badgeClass = "bg-emerald-100 text-emerald-800"; iconeBadge = "fa-arrow-trend-up"; }
                    if(prod.status.includes('Alerta')) { badgeClass = "bg-rose-100 text-rose-800"; iconeBadge = "fa-arrow-trend-down"; }

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition group";
                    tr.innerHTML = `
                        <td class="px-6 py-4"><input type="checkbox" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"></td>
                        <td class="px-6 py-4">
                            <div class="font-medium text-slate-900">${prod.nome}</div>
                            <div class="text-xs text-slate-500">${prod.sku}</div>
                        </td>
                        <td class="px-6 py-4 text-slate-600">R$ ${prod.custo.toFixed(2)}</td>
                        <td class="px-6 py-4 font-medium text-slate-900">R$ ${prod.preco_atual.toFixed(2)}</td>
                        <td class="px-6 py-4 font-bold text-slate-700">${prod.margem}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${badgeClass}">
                                <i class="fas ${iconeBadge}"></i> ${prod.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick='abrirDrawer(${JSON.stringify(prod)})' class="text-indigo-600 hover:text-indigo-900 font-medium text-sm opacity-0 group-hover:opacity-100 transition">
                                <i class="fas fa-magic mr-1"></i> Editar IA
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        // 2. Controle do Drawer
        function abrirDrawer(produto) {
            produtoAtual = produto;
            document.getElementById('drawer-nome-produto').innerText = produto.nome;
            document.getElementById('drawer-sku').innerText = "SKU: " + produto.sku;
            
            // Reseta a área de IA
            document.getElementById('resultado-ia').classList.add('hidden');
            document.getElementById('texto-gerado').innerText = "";

            document.getElementById('drawer-ia').classList.remove('translate-x-full');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function fecharDrawer() {
            document.getElementById('drawer-ia').classList.add('translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        }

        // 3. Ação da I.A. com Skeleton Loader
        async function gerarDescricaoIA() {
            if(!produtoAtual) return;

            // Esconde resultado, mostra blocos piscando (Skeleton)
            document.getElementById('resultado-ia').classList.add('hidden');
            document.getElementById('skeleton-loader').classList.remove('hidden');

            try {
                // Chama seu motor no Node.js
                const response = await fetch('/api/ia/gerar-descricao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome_produto: produtoAtual.nome,
                        caracteristicas: "Extrair do Bling, foco em uso prático."
                    })
                });
                
                const data = await response.json();
                
                // Esconde Skeleton, mostra resultado
                document.getElementById('skeleton-loader').classList.add('hidden');
                document.getElementById('texto-gerado').innerText = data.descricao_gerada;
                document.getElementById('resultado-ia').classList.remove('hidden');

            } catch (error) {
                alert("Erro ao gerar. O Gemini API Key está configurado?");
                document.getElementById('skeleton-loader').classList.add('hidden');
            }
        }

        // Inicia o sistema ao carregar a página
        window.onload = carregarProdutos;
    </script>
</body>
</html>
