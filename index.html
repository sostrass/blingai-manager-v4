<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass AI Enterprise - Modular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css"> <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .ios-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; outline: none; font-size: 13px; width: 100%; transition: all 0.2s; }
        .ios-input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-3"></div>

    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col shadow-xl z-20 shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-950">
            <h1 class="text-lg font-bold text-white flex items-center gap-2"><i class="fas fa-gem text-indigo-500"></i> Sóstrass<span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-1.5 rounded">PRO</span></h1>
        </div>
        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Operacional</p>
            <button onclick="carregarView('catalogo')" id="nav-catalogo" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 text-white bg-indigo-600 rounded-lg font-medium transition shadow-lg"><i class="fas fa-chart-line w-5 text-center"></i> Catálogo ERP</button>
            <button onclick="carregarView('massa')" id="nav-massa" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition"><i class="fas fa-bolt text-amber-400 w-5 text-center"></i> Op. em Massa</button>
            <button onclick="carregarView('ia')" id="nav-ia" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition"><i class="fas fa-robot text-emerald-400 w-5 text-center"></i> Central I.A.</button>
            <div class="my-4 border-t border-slate-800"></div>
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Sistema</p>
            <button onclick="carregarView('config')" id="nav-config" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 hover:text-white hover:bg-slate-800 rounded-lg transition"><i class="fas fa-cog w-5 text-center"></i> Configurações</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative bg-slate-50/50">
        <header class="h-16 glass-panel flex items-center justify-between px-8 z-10 sticky top-0 border-b border-slate-200">
            <div class="flex-1 max-w-2xl relative"><i class="fas fa-search absolute left-4 top-3 text-slate-400"></i><input type="text" placeholder="Buscar Produto ou SKU..." class="w-full ios-input pl-10 py-2.5" id="buscaGeral"></div>
            <div id="serverBar" class="ml-4 px-4 py-1.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-full text-xs font-bold flex items-center gap-2"><i class="fas fa-circle-notch fa-spin"></i> Proxy Conectando...</div>
        </header>

        <main class="flex-1 overflow-auto p-8" id="app-content">
            <div class="flex items-center justify-center h-full text-slate-400">
                <i class="fas fa-spinner fa-spin text-3xl"></i>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
