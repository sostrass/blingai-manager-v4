<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingAI Manager v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-10">
        <h1 class="text-xl font-bold text-slate-900"><i class="fas fa-layer-group text-indigo-600 mr-2"></i>BlingAI Manager v4</h1>
        <span class="text-sm font-medium text-emerald-600"><i class="fas fa-satellite-dish mr-1"></i> Radar de Mercado Ativo</span>
    </header>

    <main class="flex-1 overflow-auto p-8">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Teste de Catálogo (Sem Risco)</h2>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
                        <tr>
                            <th class="px-6 py-4">Produto</th>
                            <th class="px-6 py-4">Custo Fixo</th>
                            <th class="px-6 py-4">Preço Atual</th>
                            <th class="px-6 py-4 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-produtos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="drawer-ia" class="fixed inset-y-0 right-0 w-[500px] bg-white shadow-2xl transform translate-x-full transition-transform z-50 border-l border-slate-200 flex flex-col">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-slate-800"><i class="fas fa-radar text-indigo-600 mr-2"></i> Radar de Concorrência</h3>
            <button onclick="fecharDrawer()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="p-6 flex-1 overflow-auto">
            <h4 id="drawer-nome" class="font-bold text-lg text-slate-900"></h4>
            <p class="text-sm text-slate-500 mb-4">Custo base: R$ <span id="drawer-custo" class="font-bold text-slate-700"></span></p>

            <div class="bg-slate-100 p-4 rounded-lg mb-6 border border-slate-200">
                <p class="text-xs font-bold text-slate-500 uppercase mb-2">Links dos Concorrentes</p>
                <textarea id="urls-concorrentes" rows="4" placeholder="Cole os links aqui (um por linha)..." class="w-full p-3 text-xs font-mono border rounded mb-3 focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                
                <button id="btn-espionar" onclick="acionarRadar()" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-sm py-2.5 rounded font-medium transition shadow flex justify-center items-center gap-2">
                    <i class="fas fa-search-dollar"></i> Varrer Concorrentes
                </button>
                
                <div id="resultado-espiao" class="mt-4 space-y-3"></div>
            </div>

            <button onclick="acionarIA()" id="btn-ia" class="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 py-2.5 rounded-lg font-medium transition hover:bg-indigo-100">
                <i class="fas fa-sparkles text-indigo-500 mr-1"></i> Gerar Descritivo I.A.
            </button>
            <div id="resultado-ia" class="mt-3 bg-white border p-3 rounded text-sm text-slate-700 hidden"></div>
        </div>
    </div>

    <div id="overlay" onclick="fecharDrawer()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden"></div>

    <script>
        let produtoAtual = null;

        async function carregar() {
            const res = await fetch('/api/produtos/monitoramento');
            const data = await res.json();
            const tb = document.getElementById('tabela-produtos');
            tb.innerHTML = '';
            data.dados.forEach(p => {
                tb.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-medium">${p.nome}<br><span class="text-xs text-slate-400">${p.sku}</span></td>
                        <td class="px-6 py-4 font-bold text-slate-600">R$ ${p.custo.toFixed(2)}</td>
                        <td class="px-6 py-4 text-indigo-600 font-medium">R$ ${p.preco_atual.toFixed(2)}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick='abrirDrawer(${JSON.stringify(p)})' class="bg-indigo-600 text-white px-4 py-2 rounded text-sm hover:bg-indigo-700 font-medium shadow-sm">Abrir Radar</button>
                        </td>
                    </tr>`;
            });
        }

        function abrirDrawer(p) {
            produtoAtual = p;
            document.getElementById('drawer-nome').innerText = p.nome;
            document.getElementById('drawer-custo').innerText = p.custo.toFixed(2);
            document.getElementById('urls-concorrentes').value = '';
            document.getElementById('resultado-espiao').innerHTML = '';
            document.getElementById('resultado-ia').classList.add('hidden');
            
            document.getElementById('drawer-ia').classList.remove('translate-x-full');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function fecharDrawer() {
            document.getElementById('drawer-ia').classList.add('translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        }

        // NOVO MOTOR DO RADAR
        async function acionarRadar() {
            const textoUrls = document.getElementById('urls-concorrentes').value;
            // Quebra o texto pelas linhas e remove as vazias
            const urlsArray = textoUrls.split('\n').map(u => u.trim()).filter(u => u !== '');
            
            if(urlsArray.length === 0) return alert("Cole pelo menos um link!");
            
            const btn = document.getElementById('btn-espionar');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Varrendo ' + urlsArray.length + ' sites...';
            document.getElementById('resultado-espiao').innerHTML = '';
            
            try {
                const res = await fetch('/api/scraper/precos-multiplos', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls: urlsArray })
                });
                const data = await res.json();
                
                if(data.sucesso) {
                    const custo = produtoAtual.custo;
                    let htmlResultados = '';

                    // Cria um "card" visual para cada concorrente encontrado
                    data.resultados.forEach((item, index) => {
                        const dominioUrl = new URL(item.url).hostname.replace('www.', '');
                        
                        if(item.sucesso) {
                            const precoNum = parseFloat(item.preco.replace(/[^0-9,.]/g, '').replace(',', '.'));
                            const lucro = precoNum - custo;
                            const margem = ((lucro / precoNum) * 100).toFixed(1);
                            
                            let corMargem = margem >= 30 ? "text-emerald-600" : (margem >= 15 ? "text-amber-500" : "text-rose-600");
                            
                            htmlResultados += `
                            <div class="bg-white border rounded p-3 shadow-sm flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase break-all">Alvo ${index + 1} (${dominioUrl})</p>
                                    <p class="text-lg font-black text-slate-800">R$ ${precoNum.toFixed(2)}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-slate-500">Se igualar:</p>
                                    <p class="text-sm font-bold ${corMargem}">${margem}% Margem</p>
                                </div>
                            </div>`;
                        } else {
                            htmlResultados += `
                            <div class="bg-rose-50 border border-rose-100 rounded p-3 text-xs text-rose-600 flex justify-between items-center">
                                <span class="truncate w-3/4">Alvo ${index + 1}: Erro de leitura</span>
                                <i class="fas fa-exclamation-circle"></i>
                            </div>`;
                        }
                    });

                    document.getElementById('resultado-espiao').innerHTML = htmlResultados;
                }
            } catch(e) { document.getElementById('resultado-espiao').innerText = "Falha crítica na varredura."; }
            
            btn.innerHTML = '<i class="fas fa-search-dollar"></i> Varrer Concorrentes';
        }

        async function acionarIA() {
            const box = document.getElementById('resultado-ia');
            box.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';
            box.classList.remove('hidden');
            try {
                const res = await fetch('/api/ia/gerar-descricao', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome_produto: produtoAtual.nome, caracteristicas: "" })
                });
                const data = await res.json();
                box.innerText = data.descricao_gerada;
            } catch(e) { box.innerText = "Erro."; }
        }

        window.onload = carregar;
    </script>
</body>
</html>
