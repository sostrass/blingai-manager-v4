<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlingAI Manager v4 - Enterprise</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070e;--s1:#0e0e1a;--s2:#14141f;--s3:#1a1a28;
  --glass:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.07);
  --accent:#6366f1;--ag:#22d3a5;--ar:#f87171;--aw:#fbbf24;
  --t1:#eeeef5;--t2:#8888a8;--t3:#50506a;
  --teal:#14b8a6;--blue:#3b82f6;--purple:#a78bfa;
  --r:14px;--rs:9px;--rm:11px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
 
/* ── HEADER NAV ── */
.header-nav{background:var(--s1);border-bottom:1px solid var(--gb);display:flex;align-items:center;padding:0 24px;height:58px;flex-shrink:0;gap:0;}
.logo{display:flex;align-items:center;gap:9px;margin-right:32px;flex-shrink:0;}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#14b8a6);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.logo h1{font-size:14px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;}
.logo .ver{font-size:9px;color:var(--t3);}
.nav-menu{display:flex;gap:4px;flex:1;}
.nav-item{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;cursor:pointer;transition:all .12s;color:var(--t2);font-size:13px;font-weight:500;white-space:nowrap;}
.nav-item:hover{background:var(--glass);color:var(--t1);}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent);border:1px solid rgba(99,102,241,.22);}
.nav-badge{background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:2px;}
.nav-badge.red{background:var(--ar);}
.nav-sep{width:1px;height:28px;background:var(--gb);margin:0 12px;}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
 
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.page-header{padding:14px 24px;border-bottom:1px solid var(--gb);display:flex;align-items:center;justify-content:space-between;background:var(--s1);flex-shrink:0;gap:12px;}
.ph-info h2{font-size:15px;font-weight:600;}
.ph-info .sub{font-size:11px;color:var(--t3);margin-top:2px;}
.ph-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}
 
/* ── CATALOG GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.cat-card{background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);padding:15px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;}
.cat-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.cat-card.selected{border-color:var(--accent);background:rgba(99,102,241,.08);}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px;}
.cc-sku{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.cc-cat{font-size:10px;color:var(--t3);padding:2px 7px;background:var(--s3);border-radius:20px;}
.cc-name{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.cc-plats{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap;}
.cc-plat-dot{width:11px;height:11px;border-radius:2px;overflow:hidden;display:inline-flex;}
.cc-footer{border-top:1px solid var(--gb);padding-top:10px;display:flex;align-items:center;justify-content:space-between;}
.cc-price{font-size:15px;font-weight:700;color:var(--teal);}
.cc-marg{font-size:12px;font-weight:600;}
 
/* ── CARDS ── */
.gc{background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);padding:15px;margin-bottom:12px;}
.gc-sm{padding:11px 13px;}
.gc-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.9px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.gc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat-pill{background:var(--s3);border:1px solid var(--gb);border-radius:var(--rm);padding:12px 13px;}
.sp-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px;}
.sp-v{font-size:17px;font-weight:700;}
 
/* ── FORMS iOS ── */
.ios-group{background:var(--s1);border-radius:var(--r);overflow:hidden;border:1px solid var(--gb);margin-bottom:10px;}
.ios-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--gb);gap:8px;}
.ios-row:last-child{border-bottom:none;}
.ios-row .ir-label{font-size:12px;color:var(--t2);font-weight:500;flex-shrink:0;min-width:130px;}
.ios-row .ir-label.w{min-width:170px;}
.ios-row .ir-val{flex:1;display:flex;align-items:center;gap:5px;justify-content:flex-end;}
.ios-row input,.ios-row select{background:transparent;border:none;outline:none;color:var(--t1);font-size:13px;font-family:inherit;text-align:right;width:100%;}
.ios-row .unit{font-size:11px;color:var(--t3);flex-shrink:0;}
.ios-sect{font-size:10px;color:var(--t3);padding:8px 12px 3px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;background:var(--bg);}
.form-input{width:100%;background:var(--s1);border:1px solid var(--gb);border-radius:var(--rm);padding:12px;color:var(--t1);font-size:12px;outline:none;font-family:inherit;resize:vertical;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
 
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .13s;white-space:nowrap;font-family:inherit;}
.btn-accent{background:var(--accent);color:#fff;}.btn-accent:hover{background:#5254d0;}
.btn-ghost{background:var(--glass);color:var(--t1);border:1px solid var(--gb);}.btn-ghost:hover{background:var(--s3);}
.btn-green{background:rgba(34,211,165,.13);color:var(--ag);border:1px solid rgba(34,211,165,.2);}.btn-green:hover{background:rgba(34,211,165,.22);}
.btn-red{background:rgba(248,113,113,.1);color:var(--ar);border:1px solid rgba(248,113,113,.18);}
.btn-amber{background:rgba(251,191,36,.1);color:var(--aw);border:1px solid rgba(251,191,36,.18);}
.btn-ai{background:linear-gradient(135deg,#6366f1,#14b8a6);color:#fff;}.btn-ai:hover{opacity:.88;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:6px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
 
/* ── PLATFORM CHIPS ── */
.plat-grid{display:flex;flex-wrap:wrap;gap:6px;}
.plat-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .13s;}
.plat-chip.on{opacity:1;}.plat-chip.off{opacity:.25;filter:grayscale(.8);}
 
/* ── PRICING PANELS ── */
.mp-panel{background:var(--s1);border:1px solid var(--gb);border-radius:var(--r);margin-bottom:7px;overflow:hidden;}
.mp-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;transition:background .12s;}
.mp-head:hover{background:rgba(255,255,255,.02);}
.mp-head-l,.mp-head-r{display:flex;align-items:center;gap:9px;}
.fee-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px;margin-bottom:10px;}
.fee-box{background:var(--s3);border-radius:var(--rm);padding:9px 11px;}
.fee-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.fee-inp-row{display:flex;align-items:center;gap:4px;}
.fee-inp-row input{background:var(--s2);border:1px solid var(--gb);border-radius:7px;padding:5px 8px;color:var(--t1);font-size:13px;font-weight:600;outline:none;text-align:right;width:100%;font-family:inherit;transition:border-color .12s;}
.fee-inp-row input:focus{border-color:var(--accent);}
.fee-inp-row .fu{font-size:11px;color:var(--t3);flex-shrink:0;}
.result-strip{background:rgba(0,0,0,.25);border-radius:var(--rm);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;border:1px solid var(--gb);}
.rs-price{font-size:20px;font-weight:700;}
.rs-stats{display:flex;gap:12px;flex-wrap:wrap;}
.rss .rl{font-size:10px;color:var(--t3);margin-bottom:1px;}
.rss .rv{font-weight:700;font-size:12px;}
 
/* ── AI PANEL ── */
.ai-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);border-radius:var(--r);padding:13px;position:relative;overflow:hidden;}
.ai-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,#6366f1,#14b8a6,#6366f1);background-size:200%;animation:ab 3s linear infinite;}
@keyframes ab{0%{background-position:0%}100%{background-position:200%}}
.ai-out{background:rgba(0,0,0,.3);border:1px solid var(--gb);border-radius:var(--rm);padding:11px;font-size:12px;line-height:1.65;min-height:60px;color:var(--t1);white-space:pre-wrap;max-height:220px;overflow-y:auto;}
 
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.bg-green{background:rgba(34,211,165,.12);color:var(--ag);}
.bg-red{background:rgba(248,113,113,.12);color:var(--ar);}
.bg-amber{background:rgba(251,191,36,.12);color:var(--aw);}
.bg-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.bg-gray{background:var(--s3);color:var(--t3);}
 
/* ── TOOLTIP ── */
.tip{position:relative;display:inline-flex;}
.tip .tip-text{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--gb);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--t2);z-index:200;line-height:1.5;max-width:220px;white-space:normal;pointer-events:none;}
.tip:hover .tip-text{display:block;}
.tip-icon{width:15px;height:15px;border-radius:50%;background:rgba(99,102,241,.2);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:help;flex-shrink:0;}
 
/* ── DRAG PANELS ── */
.drag-zone{display:flex;flex-direction:column;gap:8px;}
.drag-panel{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);overflow:hidden;transition:border-color .15s,opacity .15s;}
.drag-panel.dragging{opacity:.5;border:2px dashed var(--accent);}
.drag-panel.drag-over{border-color:var(--ag);background:rgba(34,211,165,.04);}
.dp-handle{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--gb);user-select:none;transition:background .12s;}
.dp-handle.unlocked{cursor:grab;}.dp-handle.unlocked:active{cursor:grabbing;}
.dp-handle-l{display:flex;align-items:center;gap:7px;}
.dp-dots{display:flex;flex-direction:column;gap:2px;opacity:.35;}
.dp-dots span{display:block;width:12px;height:1.5px;background:var(--t2);border-radius:2px;}
.dp-body{padding:13px;}
.dp-body.col{display:none;}
.dp-arr{font-size:10px;color:var(--t3);cursor:pointer;transition:transform .18s;display:inline-block;}
.dp-arr.open{transform:rotate(180deg);}
 
/* ── LOCK BTN ── */
.lock-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--gb);background:var(--glass);color:var(--t2);transition:all .12s;white-space:nowrap;}
.lock-btn.open{border-color:rgba(251,191,36,.3);color:var(--aw);background:rgba(251,191,36,.08);}
 
/* ── PRODUCT TABS ── */
.ptabs{display:flex;gap:2px;background:var(--s2);border-radius:10px;padding:2px;flex-shrink:0;}
.ptab{padding:5px 11px;border-radius:8px;font-size:11px;cursor:pointer;color:var(--t2);transition:all .12s;font-weight:500;white-space:nowrap;}
.ptab:hover{color:var(--t1);}
.ptab.on{color:var(--t1);background:var(--s3);}
 
/* ── MASSA ── */
.massa-list{display:flex;flex-direction:column;}
.ml-header,.ml-item{display:grid;grid-template-columns:20px 72px 1fr 80px 78px 58px 90px;align-items:center;gap:8px;padding:8px 12px;}
.ml-header{background:var(--s3);font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-radius:var(--rm) var(--rm) 0 0;}
.ml-item{border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s;}
.ml-item:hover{background:rgba(255,255,255,.02);}
.ml-item:last-child{border-bottom:none;}
.ml-item.sel{background:rgba(99,102,241,.1);}
.ml-check{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s;flex-shrink:0;}
.ml-item.sel .ml-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.me-panel{background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);padding:14px;}
.me-mode-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.me-mode-btn{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--gb);background:transparent;color:var(--t2);transition:all .12s;font-family:inherit;}
.me-mode-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.me-op-row{display:flex;background:var(--s3);border-radius:var(--rm);overflow:hidden;border:1px solid var(--gb);margin-bottom:10px;}
.me-op-btn{flex:1;padding:7px 4px;font-size:11px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-weight:600;transition:all .12s;}
.me-op-btn.on{background:var(--accent);color:#fff;}
.me-val-row{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--gb);border-radius:var(--rm);padding:8px 12px;margin-bottom:10px;}
.me-val-row input{background:none;border:none;outline:none;color:var(--t1);font-size:22px;font-weight:700;width:100%;text-align:right;font-family:inherit;}
 
/* ── FORMULA BOX ── */
.fbox{background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.15);border-radius:var(--rs);padding:10px 12px;font-size:11px;color:var(--t2);line-height:1.6;}
.fbox strong{color:var(--t1);}
.f-step{display:flex;align-items:flex-start;gap:7px;margin-top:5px;}
.f-num{width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;}
 
/* ── DIM BOX ── */
.dim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.dim-box{background:var(--s2);border:1px solid var(--gb);border-radius:var(--rm);padding:9px;text-align:center;}
.dim-box label{display:block;font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.dim-box input{width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-size:15px;font-weight:700;font-family:inherit;text-align:center;}
.dim-unit{font-size:9px;color:var(--t3);margin-top:2px;}
 
/* ── LOG ── */
.log-entry{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;}
.log-entry:last-child{border-bottom:none;}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.log-ok .log-dot{background:var(--ag);}.log-err .log-dot{background:var(--ar);}.log-warn .log-dot{background:var(--aw);}.log-info .log-dot{background:var(--blue);}
 
/* ── SPINNER ── */
.spin{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}
 
/* ── TOAST ── */
.toast{position:fixed;bottom:15px;right:15px;background:var(--s3);border:1px solid var(--gb);border-radius:12px;padding:9px 14px;font-size:12px;display:none;align-items:center;gap:7px;z-index:9999;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes tu{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
 
/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);text-align:center;padding:40px;}
.empty h3{font-size:14px;color:var(--t1);margin:10px 0 5px;}
 
/* ── SERVER STATUS BAR ── */
.server-bar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:rgba(34,211,165,.08);border:1px solid rgba(34,211,165,.2);border-radius:8px;font-size:11px;color:var(--ag);}
.server-bar.offline{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2);color:var(--ar);}
.server-bar.checking{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:var(--aw);}
 
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gb);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
 
<div class="header-nav">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div><h1>BlingAI Manager</h1><span class="ver">v4 · Gestão inteligente</span></div>
  </div>
  <div class="nav-menu">
    <div class="nav-item active" onclick="navTo('catalogo')" id="nav-catalogo">📦 Catálogo <span class="nav-badge" id="prodCount">0</span></div>
    <div class="nav-item" onclick="navTo('massa')" id="nav-massa">⚡ Em Massa</div>
    <div class="nav-item" onclick="navTo('precos')" id="nav-precos">🌐 Precificação</div>
    <div class="nav-item" onclick="navTo('simulador')" id="nav-simulador">📊 Simulador</div>
    <div class="nav-item" onclick="navTo('ia')" id="nav-ia">🤖 Central I.A.</div>
    <div class="nav-item" onclick="navTo('log')" id="nav-log">📋 Logs <span id="logBadge" class="nav-badge red" style="display:none;"></span></div>
    <div class="nav-item" onclick="navTo('config')" id="nav-config">⚙️ Config</div>
  </div>
  <div class="nav-right">
    <div id="serverBar" class="server-bar checking">⟳ Verificando servidor...</div>
    <div class="lock-btn" id="lockBtn" onclick="toggleLock()">🔒 Fixo</div>
  </div>
</div>
 
<div class="main">
  <div class="page-header" id="pageHeader">
    <div class="ph-info">
      <h2 id="tbTitle">Catálogo de Produtos</h2>
      <div class="sub" id="tbSub">Todos os produtos sincronizados</div>
    </div>
    <div class="ph-actions" id="phActions"></div>
  </div>
  <div class="content" id="mainArea">
    <div class="empty"><div style="font-size:36px">📦</div><h3>Carregando...</h3></div>
  </div>
</div>
</div>
<div class="toast" id="toast"><span id="tIcon">✓</span><span id="tMsg"></span></div>
 
<script>
// ═══════════════════════════════════════════════════════
// 🔒 CONFIGURAÇÃO DO SERVIDOR BACKEND
// Cole aqui a URL gerada após o deploy no Railway.
// ═══════════════════════════════════════════════════════
const API_BASE = localStorage.getItem('bmp4_apibase') || 'http://localhost:3000';

// ══ FORMAT ══
const f2=n=>Number(n||0).toFixed(2).replace('.',',');
const f1=n=>Number(n||0).toFixed(1).replace('.',',');
const f3=n=>Number(n||0).toFixed(3).replace('.',',');
 
function getBaseCost(prod){
  const gc=globalCosts;
  const emb=(prod.embalagemExtra>0)?parseFloat(prod.embalagemExtra):(parseFloat(gc.embalagem)||0);
  const frete=(prod.freteExtra>0)?parseFloat(prod.freteExtra):(parseFloat(gc.frete)||0);
  return (prod.cost||0)+emb+frete;
}
function calcBlingPrice(prod){
  const base=getBaseCost(prod);
  const gc=globalCosts;
  const den=1-(parseFloat(gc.ganho)||0+parseFloat(gc.imposto)||0+parseFloat(gc.cartao)||0)/100;
  if(den<=0) return base*3;
  let p=base/den;
  return p;
}
function calcMktPrice(blingPrice,platId,rates){
  const pl=PLATS.find(x=>x.id===platId);if(!pl) return blingPrice;
  const r=rates||{};
  let pct=0,fixed=0;
  pl.fees.forEach(f=>{const v=parseFloat(r[f.k]??f.d)||0;if(f.u==='%')pct+=v;else fixed+=v;});
  let p=blingPrice+fixed;
  if(pct>0&&pct<100) p=p/(1-pct/100);
  return p;
}
function calcMargin(price,baseCost){return price>0?((price-baseCost)/price)*100:0;}

async function apiGet(path){

  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function apiPut(path,body){
  const r=await fetch(`${API_BASE}${path}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function apiPost(path,body){

  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
 
// ══ DRAG ══
let dragSrc=null;
function toggleLock(){
  dragLocked=!dragLocked;
  const btn=document.getElementById('lockBtn');
  if(btn){btn.textContent=dragLocked?'🔒 Fixo':'🔓 Arrastável';btn.className='lock-btn'+(dragLocked?'':' open');}
  document.querySelectorAll('.dp-handle').forEach(h=>{h.draggable=!dragLocked;h.className='dp-handle'+(dragLocked?'':' unlocked');});
  toast(dragLocked?'Painéis fixos':'Arraste os painéis para reorganizar!');
}
function initDrag(zone){
  if(!zone) return;
  zone.querySelectorAll('.drag-panel').forEach(panel=>{
    const h=panel.querySelector('.dp-handle');if(!h) return;
    h.draggable=!dragLocked;h.className='dp-handle'+(dragLocked?'':' unlocked');
    h.addEventListener('dragstart',e=>{if(dragLocked){e.preventDefault();return;}dragSrc=panel;panel.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');});
    panel.addEventListener('dragover',e=>{e.preventDefault();if(panel!==dragSrc)panel.classList.add('drag-over');});
    panel.addEventListener('dragleave',()=>panel.classList.remove('drag-over'));
    panel.addEventListener('drop',e=>{e.preventDefault();panel.classList.remove('drag-over');if(dragSrc&&dragSrc!==panel){const all=[...zone.children];const si=all.indexOf(dragSrc),ti=all.indexOf(panel);if(si<ti)zone.insertBefore(dragSrc,panel.nextSibling);else zone.insertBefore(dragSrc,panel);}});
    panel.addEventListener('dragend',()=>{panel.classList.remove('dragging');dragSrc=null;});
  });
}
function dp(id,title,icon,content,tip=''){
  const col=colPanels[id];
  const tipHtml=tip?`<div class="tip"><span class="tip-icon">?</span><div class="tip-text">${tip}</div></div>`:'';
  return `<div class="drag-panel" id="dpp-${id}">
    <div class="dp-handle${dragLocked?'':' unlocked'}">
      <div class="dp-handle-l"><div class="dp-dots"><span></span><span></span><span></span></div><span style="font-size:14px;">${icon}</span><span style="font-size:12px;font-weight:600;color:var(--t1);">${title}</span>${tipHtml}</div>
      <span class="dp-arr${col?'':' open'}" id="dpa-${id}" onclick="colT('${id}')">▾</span>
    </div>
    <div class="dp-body${col?' col':''}" id="dpb-${id}">${content}</div>
  </div>`;
}
function colT(id){colPanels[id]=!colPanels[id];const b=document.getElementById('dpb-'+id);const a=document.getElementById('dpa-'+id);if(b)b.className='dp-body'+(colPanels[id]?' col':'');if(a)a.className='dp-arr'+(colPanels[id]?'':' open');}

  items.forEach(p=>{const c=p.cat||'Outros';if(!byCat[c])byCat[c]=[];byCat[c].push(p);});
  let html='';
  Object.entries(byCat).forEach(([cat,prods])=>{
    html+=`<div style="margin-bottom:20px;">
      <div style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding:0 2px;">${cat} <span style="color:var(--t3);font-weight:400;">(${prods.length})</span></div>

          <div><div style="font-size:9px;color:var(--t3);margin-bottom:2px;">Preço Bling</div><div class="cc-price">R$ ${f2(p.price)}</div></div>

async function executarRadarPim(){

  resDiv.innerHTML = '<div style="color:var(--t3); font-size:12px; display:flex; align-items:center; gap:8px;"><div class="spin"></div> Raspando links no servidor...</div>';

async function gerarSAC(){

  const prompt = `DIRETRIZ MESTRA: CONSULTOR PARCEIRO SÓSTRASS
  1. EDUCAÇÃO E CUMPRIMENTO: Comece com cumprimento amigável (Olá, Oi). Valide o que o cliente disse.
  2. AUTORIDADE TÉCNICA: Fale da utilidade prática do produto para artesanato (miçangas, pérolas).
  3. LINGUAGEM NATURAL: Proibido usar asteriscos ou negritos. Sem palavras difíceis ou respostas robóticas.
  4. FORMATO: Máximo 480 caracteres. Assinatura: Equipe Sóstrass Acessórios e Pedrarias.

  try{

function massaFiltered(){
  const q=massaQ.toLowerCase();
  return products.filter(p=>{
    const qok=!q||p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q);
    const cok=massaCat==='all'||p.cat===massaCat;
    return qok&&cok;
  });
}
function renderMassaList(){
  const cont=document.getElementById('massaList');if(!cont) return;
  const items=massaFiltered();
  if(!items.length){cont.innerHTML='<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px;">Nenhum produto</div>';return;}
  cont.innerHTML=items.map(p=>{
    const isSel=massaSel.has(p.id);
    const base=getBaseCost(p);const marg=calcMargin(p.price,base);const ok=marg>15;
    return`<div class="ml-item ${isSel?'sel':''}" onclick="toggleMassa(${p.id})">
      <div class="ml-check">${isSel?'✓':''}</div>
      <span style="font-size:10px;color:var(--accent);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.sku}</span>

}
function toggleMassa(id){if(massaSel.has(id))massaSel.delete(id);else massaSel.add(id);updateMassaCount();renderMassaList();renderMassaPreview();}
function massaSelAll(){massaFiltered().forEach(p=>massaSel.add(p.id));updateMassaCount();renderMassaList();renderMassaPreview();}
function massaSelNone(){massaSel.clear();updateMassaCount();renderMassaList();renderMassaPreview();}
function updateMassaCount(){const el=document.getElementById('massaCount');if(el)el.textContent=massaSel.size===0?'Nenhum selecionado':`${massaSel.size} selecionado${massaSel.size>1?'s':''}`;}
function setMassaMode(m){massaMode=m;document.querySelectorAll('.me-mode-btn').forEach(b=>b.classList.toggle('on',b.id==='mmb-'+m));updateMassaUnit();renderMassaPreview();}
function setMassaOp(op){massaOp=op;document.querySelectorAll('.me-op-btn').forEach(b=>b.classList.toggle('on',b.id==='mop-'+op));updateMassaUnit();renderMassaPreview();}
function updateMassaUnit(){
  const isRs=['preco','custo'].includes(massaMode)&&['set','addfix'].includes(massaOp);
  const isPct=massaOp==='addpct';
  const pre=document.getElementById('mUnitPre');const pos=document.getElementById('mUnitPos');
  if(pre)pre.textContent=isRs?'R$':'';
  if(pos)pos.textContent=isPct?'%':'';
}
function calcMassaVal(p,iv){
  let src=massaMode==='custo'?p.cost:p.price;
  if(massaOp==='set') return Math.max(0,iv);
  if(massaOp==='addpct') return Math.max(0,src*(1+iv/100));
  if(massaOp==='addfix') return Math.max(0,src+iv);
  return iv;
}
function renderMassaPreview(){
  const area=document.getElementById('massaPreview');if(!area) return;
  if(massaSel.size===0){area.innerHTML='<div style="font-size:11px;color:var(--t3);">Selecione produtos para ver o impacto.</div>';return;}
  const iv=parseFloat(document.getElementById('massaValI')?.value)||0;
  const selProds=products.filter(p=>massaSel.has(p.id));
  const shown=selProds.slice(0,6);const more=selProds.length-6;
  const rows=shown.map(p=>{
    const nv=calcMassaVal(p,iv);
    let old=massaMode==='preco'?p.price:p.cost;
    const ch=Math.abs(nv-old)>0.001;const up=nv>old;
    return`<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);">
      <span style="font-size:9px;color:var(--accent);font-weight:700;min-width:50px;">${p.sku}</span>
      ${ch?`<span style="font-size:10px;color:var(--t3);">R$ ${f2(old)}</span><span style="font-size:10px;color:var(--t3);">→</span><span style="font-size:11px;font-weight:700;color:${up?'var(--ag)':'var(--ar)'};">R$ ${f2(nv)} ${up?'▲':'▼'}</span>`:`<span style="font-size:10px;color:var(--t3);">sem alteração</span>`}
    </div>`;
  }).join('');
  area.innerHTML=`<div style="font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:600;">${selProds.length} produto${selProds.length>1?'s':''} serão alterados</div>${rows}${more>0?`<div style="font-size:10px;color:var(--t3);margin-top:4px;">+${more} mais...</div>`:''}`;
}
function applyMassa(sendBling=false){
  if(massaSel.size===0){toast('Selecione ao menos 1 produto',false);return;}
  const iv=parseFloat(document.getElementById('massaValI')?.value)||0;
  let count=0;const affected=[];
  products.forEach(p=>{
    if(!massaSel.has(p.id)) return;
    const nv=calcMassaVal(p,iv);
    if(massaMode==='preco')p.price=nv;else if(massaMode==='custo')p.cost=nv;
    p.updated=new Date().toISOString().slice(0,10);affected.push(p);count++;
  });
  save();toast(`✓ ${count} produtos atualizados!`);
  renderMassaList();renderMassaPreview();
}
