<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingAI Manager v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-slate-900"><i class="fas fa-layer-group text-indigo-600 mr-2"></i>BlingAI Manager v4</h1>
        <span class="text-sm font-medium text-emerald-600"><i class="fas fa-circle text-xs mr-1"></i> Sistema Online</span>
    </header>

    <main class="flex-1 p-8">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Catálogo Dinâmico</h2>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
                        <tr>
                            <th class="px-6 py-4">Produto</th>
                            <th class="px-6 py-4">Custo</th>
                            <th class="px-6 py-4">Preço Atual</th>
                            <th class="px-6 py-4 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-produtos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="drawer-ia" class="fixed inset-y-0 right-0 w-[450px] bg-white shadow-2xl transform translate-x-full transition-transform z-50 border-l border-slate-200 flex flex-col">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-slate-800">Painel de Ações</h3>
            <button onclick="fecharDrawer()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="p-6 flex-1 overflow-auto">
            <h4 id="drawer-nome" class="font-bold text-lg mb-6 text-slate-900"></h4>

            <div class="bg-slate-100 p-4 rounded-lg mb-6 border border-slate-200">
                <h5 class="text-sm font-bold text-slate-700 mb-2"><i class="fas fa-crosshairs text-rose-500 mr-1"></i> Espionar Concorrente</h5>
                <input type="text" id="url-concorrente" placeholder="Cole o link do Mercado Livre aqui..." class="w-full p-2 text-sm border rounded mb-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                <button id="btn-espionar" onclick="acionarEspiao()" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-sm py-2 rounded font-medium transition">
                    Verificar Preço Agora
                </button>
                <div id="resultado-espiao" class="mt-3 text-sm text-center font-bold"></div>
            </div>

            <button id="btn-ia" onclick="acionarIA()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg shadow font-medium transition">
                <i class="fas fa-sparkles text-amber-300 mr-1"></i> Gerar Descrição Blindada
            </button>
            <div id="resultado-ia" class="mt-4 bg-slate-50 border p-3 rounded text-sm text-slate-700 hidden"></div>
        </div>
    </div>

    <script>
        let produtoAtual = null;

        async function carregar() {
            const res = await fetch('/api/produtos/monitoramento');
            const data = await res.json();
            const tb = document.getElementById('tabela-produtos');
            tb.innerHTML = '';
            data.dados.forEach(p => {
                tb.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-medium">${p.nome}<br><span class="text-xs text-slate-400">${p.sku}</span></td>
                        <td class="px-6 py-4">R$ ${p.custo.toFixed(2)}</td>
                        <td class="px-6 py-4 font-bold">R$ ${p.preco_atual.toFixed(2)}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick='abrirDrawer(${JSON.stringify(p)})' class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-100 font-medium">Gerenciar</button>
                        </td>
                    </tr>`;
            });
        }

        function abrirDrawer(p) {
            produtoAtual = p;
            document.getElementById('drawer-nome').innerText = p.nome;
            document.getElementById('resultado-espiao').innerText = '';
            document.getElementById('resultado-ia').classList.add('hidden');
            document.getElementById('drawer-ia').classList.remove('translate-x-full');
        }

        function fecharDrawer() {
            document.getElementById('drawer-ia').classList.add('translate-x-full');
        }

        async function acionarEspiao() {
            const url = document.getElementById('url-concorrente').value;
            if(!url) return alert("Cole o link!");
            
            const btn = document.getElementById('btn-espionar');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Espionando...';
            
            try {
                const res = await fetch('/api/scraper/preco', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url_concorrente: url })
                });
                const data = await res.json();
                document.getElementById('resultado-espiao').innerHTML = data.sucesso ? `<span class="text-emerald-600">R$ ${data.preco_concorrente}</span>` : `<span class="text-rose-600">${data.erro}</span>`;
            } catch(e) { document.getElementById('resultado-espiao').innerText = "Erro de conexão."; }
            btn.innerHTML = 'Verificar Preço Agora';
        }

        async function acionarIA() {
            const btn = document.getElementById('btn-ia');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';
            try {
                const res = await fetch('/api/ia/gerar-descricao', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome_produto: produtoAtual.nome, caracteristicas: "Foco prático." })
                });
                const data = await res.json();
                const box = document.getElementById('resultado-ia');
                box.innerText = data.descricao_gerada;
                box.classList.remove('hidden');
            } catch(e) { alert("Erro de IA."); }
            btn.innerHTML = '<i class="fas fa-sparkles text-amber-300 mr-1"></i> Gerar Descrição Blindada';
        }

        window.onload = carregar;
    </script>
</body>
</html>
