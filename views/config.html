<div class="block space-y-6 animate-[slideIn_0.3s_ease-out]">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight"><i class="fas fa-cog text-slate-600 mr-2"></i> Infraestrutura & Logs</h2>
            <p class="text-slate-500 mt-1">Conexão segura com o Backend Proxy e auditoria do sistema.</p>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-8">
        <div class="glass-panel p-6 rounded-2xl border-l-4 border-emerald-500">
            <h3 class="font-bold text-slate-800 mb-4 border-b pb-2">Conexão Segura</h3>
            <div class="bg-emerald-50 p-3 rounded-lg text-xs text-emerald-700 mb-4"><strong>Segurança Ativa:</strong> Suas chaves de API estão protegidas no seu servidor Node.js (Railway).</div>
            <label class="text-xs font-bold text-slate-500 mb-1 block">URL do Servidor Proxy</label>
            <input type="text" id="cfgApiBase" class="ios-input mb-4 font-mono" placeholder="https://seu-railway.app">
            <label class="text-xs font-bold text-slate-500 mb-1 block">Modelo de Inteligência Artificial</label>
            <select id="cfgModel" class="ios-input mb-4"><option value="gemini-1.5-pro">Gemini 1.5 Pro</option><option value="gemini-2.5-flash">Gemini 2.5 Flash</option></select>
            <div class="flex gap-2">
                <button class="flex-1 bg-slate-800 text-white font-bold py-2.5 rounded-lg hover:bg-slate-900">Salvar Conexão</button>
                <button class="bg-slate-200 text-slate-700 px-4 py-2.5 rounded-lg font-bold hover:bg-slate-300"><i class="fas fa-satellite-dish"></i></button>
            </div>
        </div>
        <div class="glass-panel p-6 rounded-2xl h-[60vh] flex flex-col">
            <h3 class="font-bold text-slate-800 mb-4 border-b pb-2"><i class="fas fa-history mr-2"></i>Activity Feed (Timeline)</h3>
            <div id="activity-feed" class="flex-1 overflow-y-auto text-xs text-slate-600 p-2">
                <div class="timeline-item"><span class="text-slate-400">[Agora]</span> <span class="font-bold text-slate-700">Sistema Iniciado com Sucesso.</span></div>
            </div>
        </div>
    </div>
</div>
