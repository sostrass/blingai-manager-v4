<div class="block space-y-6 animate-[slideIn_0.3s_ease-out]">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3"><i class="fas fa-microchip text-emerald-600"></i> Central I.A.</h2>
            <p class="text-slate-500 mt-1">Módulos independentes de SAC e Copywriting com proteção de IP.</p>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-8">
        <div class="glass-panel rounded-2xl shadow-sm border-t-4 border-t-amber-400 overflow-hidden flex flex-col">
            <div class="bg-white/50 px-6 py-4 border-b border-slate-200/50 flex justify-between items-center"><h3 class="font-black text-slate-800"><i class="fas fa-comments text-amber-500 mr-2"></i> Consultor SAC</h3><span class="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-1 rounded-md uppercase">Modo Ateliê</span></div>
            <div class="p-6 flex-1 space-y-4">
                <div><label class="text-xs font-bold text-slate-500 uppercase">Nome do Cliente</label><input type="text" id="sac-cliente" placeholder="Ex: Cláudia" class="ios-input w-full mt-1"></div>
                <div><label class="text-xs font-bold text-slate-500 uppercase">Produto Adquirido</label><input type="text" id="sac-produto" placeholder="Ex: Alicates" class="ios-input w-full mt-1"></div>
                <div><label class="text-xs font-bold text-slate-500 uppercase">Relato</label><textarea id="sac-relato" rows="3" placeholder="Comentário do cliente..." class="ios-input w-full mt-1 resize-none"></textarea></div>
                <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition"><i class="fas fa-magic text-amber-400 mr-2"></i> Formular Resposta</button>
            </div>
        </div>
        <div class="glass-panel rounded-2xl shadow-sm border-t-4 border-t-indigo-500 overflow-hidden flex flex-col">
            <div class="bg-white/50 px-6 py-4 border-b border-slate-200/50 flex justify-between items-center"><h3 class="font-black text-slate-800"><i class="fas fa-shield-alt text-indigo-500 mr-2"></i> Descrições Blindadas</h3><span class="bg-indigo-100 text-indigo-700 text-[10px] font-bold px-2 py-1 rounded-md uppercase">Anti-Plágio IP</span></div>
            <div class="p-6 flex-1 space-y-4">
                <div><label class="text-xs font-bold text-slate-500 uppercase">Nome / Ficha Curta</label><textarea id="desc-produto" rows="2" placeholder="Ex: Caixa 30 Divisórias..." class="ios-input w-full mt-1 resize-none"></textarea></div>
                <div class="bg-indigo-50/50 border border-indigo-100 rounded-lg p-3 text-xs text-slate-600">A I.A. gerará uma descrição embutindo o código HTML jurídico de proteção da Sóstrass no final.</div>
                <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition"><i class="fas fa-cogs mr-2"></i> Gerar Ficha c/ HTML Jurídico</button>
            </div>
        </div>
    </div>
</div>
