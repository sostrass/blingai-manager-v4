<div class="block space-y-6 animate-[slideIn_0.3s_ease-out]">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight text-amber-600 flex items-center gap-3"><i class="fas fa-bolt"></i> Operação em Massa</h2>
            <p class="text-slate-500 mt-1">Aplique regras de precificação e custos para múltiplos SKUs simultaneamente.</p>
        </div>
    </div>
    <div class="grid grid-cols-3 gap-8">
        <div class="col-span-2 flex flex-col h-[75vh]">
            <div class="glass-panel rounded-t-2xl p-4 flex gap-4 border-b-0">
                <input type="text" id="massa-busca" placeholder="🔍 Buscar SKU..." class="ios-input flex-1 text-sm">
                <select id="massa-cat" class="ios-input text-sm"><option value="all">Todas Categorias</option></select>
                <button class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold border border-slate-200 hover:bg-slate-200">Sel. Todos</button>
                <button class="bg-white text-slate-500 px-3 py-1.5 rounded-lg text-sm font-bold border border-slate-200 hover:bg-slate-50">Limpar</button>
            </div>
            <div class="bg-slate-800 text-slate-300 text-[10px] uppercase tracking-wider font-bold p-3 grid grid-cols-[30px_80px_1fr_80px_80px_60px_100px] gap-2 items-center">
                <span></span><span>SKU</span><span>Produto</span><span class="text-right">Preço</span><span class="text-right">Custo Base</span><span class="text-right">Margem</span><span>Plataformas</span>
            </div>
            <div class="flex-1 overflow-y-auto bg-white border border-slate-200 border-t-0 rounded-b-2xl shadow-sm" id="massa-list">
                <div class="p-6 text-center text-slate-400">Carregando lista de produtos...</div>
            </div>
        </div>
        <div class="glass-panel rounded-2xl p-6 flex flex-col">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-4">✏️ O que editar?</div>
            <div class="flex flex-wrap gap-2 mb-4">
                <button class="px-3 py-1.5 rounded-lg text-xs font-bold border border-indigo-600 bg-indigo-600 text-white" id="btn-m-preco">💰 Preço Bling</button>
                <button class="px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-200 bg-slate-50 text-slate-600" id="btn-m-custo">💸 Custo</button>
            </div>
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">Tipo de operação</div>
            <div class="flex bg-slate-100 rounded-lg border border-slate-200 overflow-hidden mb-4">
                <button class="flex-1 py-2 text-xs font-bold bg-indigo-600 text-white" id="btn-op-set">Fixo</button>
                <button class="flex-1 py-2 text-xs font-bold text-slate-600 hover:bg-slate-200" id="btn-op-addpct">+ %</button>
            </div>
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-3 mb-6">
                <span class="text-slate-400 text-sm font-bold" id="mUnitPre">R$</span>
                <input type="number" id="massa-val" class="w-full bg-transparent outline-none text-right font-black text-2xl text-slate-800" value="0.00" step="0.01">
                <span class="text-slate-400 text-sm font-bold" id="mUnitPos"></span>
            </div>
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">👁 Prévia (<span id="massa-count-prev">0</span> itens)</div>
            <div id="massa-preview" class="flex-1 overflow-y-auto text-xs text-slate-500 mb-4 bg-slate-50 p-2 rounded border border-slate-100">Selecione produtos para ver o impacto.</div>
            <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold transition shadow-lg"><i class="fas fa-save mr-2"></i> Aplicar Alterações</button>
        </div>
    </div>
</div>
