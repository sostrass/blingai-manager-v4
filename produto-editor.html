<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass PIM - Editor Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        body { background-color: #09090b; color: #f8fafc; }
        
        .glass-header { background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Animações */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .circle-progress { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round; }
    </style>

    <script src="js/banco.js"></script>
    <script src="js/aba-produto.js"></script>
    <script src="js/aba-precificacao.js"></script>
    <script src="js/aba-estudio.js"></script>
</head>
<body class="flex h-screen overflow-hidden selection:bg-indigo-500/30 selection:text-white relative bg-slate-50 dark:bg-[#050507] transition-colors duration-300">

    <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-20 lg:w-64 bg-white dark:bg-[#09090b] border-r border-slate-200 dark:border-white/5 flex flex-col z-20 shadow-2xl transition-colors duration-300">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-slate-200 dark:border-white/5">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(79,70,229,0.4)]"><i class="fas fa-gem text-sm"></i></div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black text-slate-800 dark:text-white">Sóstrass</h1>
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mt-0.5">Enterprise PIM</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 flex flex-col gap-2">
            <a href="cockpit.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl transition"><i class="fas fa-chart-line text-lg"></i><span class="hidden lg:block text-xs font-bold">Cockpit</span></a>
            <a href="catalogo.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl transition"><i class="fas fa-layer-group text-lg"></i><span class="hidden lg:block text-xs font-bold">Gestão Master</span></a>
            <a href="produto-editor.html?id=novo" class="flex items-center gap-4 px-4 py-3 bg-indigo-600/10 text-indigo-600 dark:text-indigo-400 rounded-xl border border-indigo-500/20 shadow-inner"><i class="fas fa-box-open text-lg"></i><span class="hidden lg:block text-xs font-bold">Editor de Ficha</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative z-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-opacity-5">
        
        <header class="bg-white/90 dark:bg-[#09090b]/90 backdrop-blur-xl border-b border-slate-200 dark:border-white/5 sticky top-0 z-40 transition-colors duration-300">
            <div class="px-8 py-5 flex justify-between items-center">
                <div class="flex items-center gap-5 w-full max-w-3xl">
                    <a href="catalogo.html" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-white/10 flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-white/5 transition-all shadow-sm"><i class="fas fa-arrow-left"></i></a>
                    
                    <div class="flex flex-col">
                        <div class="flex items-center gap-3">
                            <span class="px-2 py-0.5 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded text-[9px] font-black uppercase tracking-widest">Modo Edição Avançado</span>
                            <span class="text-[10px] text-slate-500 font-bold" id="status-sync"><i class="fas fa-cloud text-slate-400"></i> Rascunho Local</span>
                        </div>
                        <div class="flex items-center gap-3 mt-1 relative group/input">
                            <input type="text" id="hdr-nome" class="bg-transparent border-none outline-none text-2xl font-black text-slate-800 dark:text-white w-[500px] placeholder:text-slate-400 transition-colors" value="Carregando Produto..." oninput="sincronizarHeaders()">
                            <button onclick="toast('IA Otimizando Título...', true)" class="text-indigo-500 hover:text-indigo-400 transition opacity-0 group-hover/input:opacity-100" title="Melhorar com IA"><i class="fas fa-wand-magic-sparkles"></i></button>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 text-amber-500 dark:text-indigo-300 border border-slate-200 dark:border-white/10 flex items-center justify-center transition shadow-sm" title="Alternar Tema">
                        <i class="fas fa-sun dark:hidden"></i><i class="fas fa-moon hidden dark:block"></i>
                    </button>
                    
                    <span class="text-[11px] font-mono font-bold text-slate-500 bg-slate-100 dark:bg-black/40 px-3 py-2.5 rounded-lg border border-slate-200 dark:border-white/5 flex items-center gap-2">SKU: <span id="lbl-sku" class="text-slate-800 dark:text-white">---</span></span>
                    <button onclick="enviarBling()" class="px-6 py-3 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white rounded-xl text-xs font-black shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all transform hover:-translate-y-0.5 flex items-center gap-2"><i class="fas fa-cloud-upload-alt"></i> Salvar e Enviar Bling</button>
                </div>
            </div>

            <div class="px-8 py-3 flex gap-3 overflow-x-auto border-t border-slate-200 dark:border-white/5 bg-slate-50/50 dark:bg-black/20">
                <button onclick="carregarAba('produto')" id="tab-produto" class="px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-lg"><i class="fas fa-tags mr-1.5 opacity-80"></i> Ficha, SEO & Fiscal</button>
                <button onclick="carregarAba('precificacao')" id="tab-precificacao" class="px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-white/5"><i class="fas fa-calculator mr-1.5 opacity-80"></i> Preços & Marketplaces</button>
                <button onclick="carregarAba('estudio')" id="tab-estudio" class="px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-white/5"><i class="fas fa-images mr-1.5 opacity-80"></i> Mídia & Estúdio IA</button>
            </div>
        </header>

        <main id="app-container" class="flex-1 overflow-y-auto p-8 lg:p-12 scroll-smooth">
            <div class="flex flex-col items-center justify-center h-[50vh] text-indigo-500/50">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p class="text-xs font-black uppercase tracking-widest">Iniciando Módulos...</p>
            </div>
        </main>
    </div>

    <script>
        // CONTROLES GERAIS
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('pim_theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('pim_theme') === 'light') document.documentElement.classList.remove('dark');

        function toast(msg, isIA = false) {
            const c = document.getElementById('toast-container'); const t = document.createElement('div');
            t.className = `bg-[#0B0B0C] border ${isIA ? 'border-indigo-500/50' : 'border-emerald-500/50'} text-white px-6 py-4 rounded-xl shadow-2xl font-bold text-xs flex items-center gap-3 relative overflow-hidden animate-fade-up`;
            let icon = isIA ? '<i class="fas fa-wand-magic-sparkles text-indigo-400 text-xl"></i>' : '<i class="fas fa-check-circle text-emerald-400 text-xl"></i>';
            let bar = isIA ? 'bg-gradient-to-b from-indigo-400 to-purple-500' : 'bg-emerald-500';
            t.innerHTML = `<div class="absolute left-0 top-0 bottom-0 w-1.5 ${bar}"></div>${icon} ${msg}`; 
            c.appendChild(t); setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
        }

        // SINCRONIZAÇÃO DO TÍTULO MASTER VS INPUT
        function sincronizarHeaders() {
            const hNome = document.getElementById('hdr-nome').value;
            const inpNome = document.getElementById('inp-prod-nome');
            if(inpNome) { 
                inpNome.value = hNome; 
                if(typeof validarFormulario === 'function') validarFormulario(); 
            }
        }

        // ROTEADOR DE ABAS (Chama as funções dos arquivos JS externos)
        function carregarAba(aba) {
            // Estilização das Pílulas
            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.className = "px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-white/5";
            });
            const btn = document.getElementById(`tab-${aba}`);
            if(btn) btn.className = "px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-500/30";

            const container = document.getElementById('app-container');

            // Mapeamento e Injeção
            if (aba === 'produto') {
                container.innerHTML = typeof renderAbaProduto === 'function' ? renderAbaProduto() : '<div class="p-10 text-rose-500">Módulo Cadastro não encontrado (Verifique js/aba-produto.js)</div>';
                if(typeof validarFormulario === 'function') validarFormulario();
            } else if (aba === 'precificacao') {
                container.innerHTML = typeof renderAbaPrecificacao === 'function' ? renderAbaPrecificacao() : '<div class="p-10 text-rose-500">Módulo Precificação não encontrado (Verifique js/aba-precificacao.js)</div>';
                if(typeof simularPrecosMaster === 'function') simularPrecosMaster(); // Dispara o cálculo inicial
            } else if (aba === 'estudio') {
                container.innerHTML = typeof renderAbaEstudio === 'function' ? renderAbaEstudio() : '<div class="p-10 text-rose-500">Módulo Estúdio não encontrado (Verifique js/aba-estudio.js)</div>';
            }
        }

        // BOTÃO DE SALVAR BLING
        function enviarBling() {
            const status = document.getElementById('status-sync');
            status.innerHTML = '<i class="fas fa-spinner fa-spin text-amber-500"></i> Sincronizando ERP...';
            setTimeout(() => {
                status.innerHTML = '<i class="fas fa-check-circle text-emerald-500"></i> Atualizado no Bling';
                toast("Ficha salva e estoque atualizado via API.", false);
            }, 1500);
        }

        // MOCKUP INICIAL DE CARREGAMENTO
        window.onload = () => {
            // Pega o ID da URL se houver (ex: ?id=CX-ORG-30)
            const urlParams = new URLSearchParams(window.location.search);
            const produtoId = urlParams.get('id') || 'Novo Produto';
            
            document.getElementById('hdr-nome').value = produtoId === 'CX-ORG-30' ? 'Kit 30 Caixas Organizadoras (30 Div)' : 'Produto sem título';
            document.getElementById('lbl-sku').innerText = produtoId;
            
            carregarAba('produto'); 
        };
    </script>
</body>
</html>
