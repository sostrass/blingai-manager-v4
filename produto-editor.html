<!DOCTYPE html>
<html lang="pt-BR" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIM - Editor Modular</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="js/aba-estudio.js"></script>
    <script src="js/aba-produto.js"></script>
    <script src="js/aba-precificacao.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        .tab-btn { transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-active { color: #6366f1; border-color: #6366f1; }
        .dark .tab-active { color: #818cf8; border-color: #818cf8; background: linear-gradient(to top, rgba(99,102,241,0.1), transparent); }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-50 dark:bg-[#050507] text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <aside class="w-20 lg:w-64 bg-white dark:bg-[#09090b] border-r border-slate-200 dark:border-white/5 flex flex-col z-20 transition-colors duration-300">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-slate-200 dark:border-white/5">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white"><i class="fas fa-gem text-sm"></i></div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black tracking-tight text-slate-800 dark:text-white">Sóstrass</h1>
                <p class="text-[9px] font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mt-0.5">PIM Enterprise</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 flex flex-col gap-2">
            <a href="cockpit.html" class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl transition"><i class="fas fa-chart-line text-lg"></i><span class="hidden lg:block text-xs font-bold">Cockpit</span></a>
            <a href="index.html" class="flex items-center gap-4 px-4 py-3 bg-indigo-50 dark:bg-white/10 text-indigo-600 dark:text-white rounded-xl border border-indigo-100 dark:border-white/5 shadow-inner"><i class="fas fa-box-open text-lg"></i><span class="hidden lg:block text-xs font-bold">Editor de Produto</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative z-10">
        
        <header class="bg-white/80 dark:bg-[#09090b]/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/5 sticky top-0 z-40 transition-colors duration-300">
            <div class="px-10 py-5 flex justify-between items-center">
                <div class="flex items-center gap-5 w-full max-w-3xl">
                    <a href="index.html" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-white/10 flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-white/10 transition-all"><i class="fas fa-arrow-left"></i></a>
                    <div>
                        <h2 class="text-2xl font-black text-slate-800 dark:text-white" id="hdr-nome">Carregando...</h2>
                        <p class="text-xs font-mono text-slate-500 mt-1">SKU: <span id="hdr-sku" class="text-indigo-600 dark:text-indigo-400 font-bold">...</span></p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full border border-slate-200 dark:border-white/10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 transition">
                        <i class="fas fa-sun dark:hidden"></i>
                        <i class="fas fa-moon hidden dark:block"></i>
                    </button>
                    
                    <button class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-black shadow-lg shadow-emerald-600/20 transition-all flex items-center gap-2"><i class="fas fa-cloud-upload-alt"></i> Atualizar Bling</button>
                </div>
            </div>
            
            <div class="px-10 flex gap-2 overflow-x-auto border-t border-slate-200 dark:border-white/5 bg-slate-50 dark:bg-black/20">
                <button onclick="carregarAba('produto')" id="tab-produto" class="tab-btn px-6 py-4 text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white"><i class="fas fa-tags mr-2"></i> Cadastro (Bling)</button>
                <button onclick="carregarAba('estudio')" id="tab-estudio" class="tab-btn px-6 py-4 text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white"><i class="fas fa-images mr-2"></i> Mídia & Estúdio IA</button>
                <button onclick="carregarAba('precificacao')" id="tab-precificacao" class="tab-btn px-6 py-4 text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white"><i class="fas fa-calculator mr-2"></i> Canais (Markup)</button>
            </div>
        </header>

        <main id="app-container" class="flex-1 overflow-y-auto p-10 2xl:px-16 scroll-smooth bg-slate-50 dark:bg-gradient-to-br dark:from-[#050507] dark:to-[#0a0a0f] transition-colors duration-300">
            </main>
    </div>

    <script>
        // CONTROLE DE TEMA (DARK/LIGHT)
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Verifica o tema salvo
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }

        // CONTROLADOR DE ABAS (O Roteador)
        function carregarAba(aba) {
            // Limpa botões
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active', 'text-indigo-600', 'dark:text-indigo-400', 'border-indigo-600', 'dark:border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/5');
            });
            
            // Ativa botão atual
            const btn = document.getElementById(`tab-${aba}`);
            if(btn) btn.classList.add('tab-active', 'text-indigo-600', 'dark:text-indigo-400', 'border-indigo-600', 'dark:border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/5');

            const container = document.getElementById('app-container');

            // Renderiza o módulo correto
            if (aba === 'estudio') {
                if (typeof renderAbaEstudio === 'function') {
                    container.innerHTML = renderAbaEstudio();
                } else {
                    container.innerHTML = '<p class="text-rose-500">Erro: Arquivo aba-estudio.js não carregado.</p>';
                }
            } else if (aba === 'produto') {
                container.innerHTML = '<div class="text-slate-500 dark:text-slate-400 text-center p-20"><i class="fas fa-tools text-4xl mb-4"></i><br>Módulo de Produtos (Bling) sendo construído...</div>';
            } else if (aba === 'precificacao') {
                container.innerHTML = '<div class="text-slate-500 dark:text-slate-400 text-center p-20"><i class="fas fa-tools text-4xl mb-4"></i><br>Módulo de Precificação Reversa sendo construído...</div>';
            }
        }

        // Mock para Header
        window.onload = () => {
            document.getElementById('hdr-nome').innerText = "Kit 30 Caixas Organizadoras Transparentes";
            document.getElementById('hdr-sku').innerText = "CX-ORG-30";
            // Inicia na aba de Estúdio para você ver a mágica
            carregarAba('estudio'); 
        };
    </script>
</body>
</html>
