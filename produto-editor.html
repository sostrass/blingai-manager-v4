<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóstrass PIM - Editor Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="js/banco.js" onerror="console.warn('banco.js não encontrado.')"></script>
    <script src="js/funcoes.js" onerror="console.warn('funcoes.js não encontrado.')"></script>
    
    <script src="js/aba-produto.js"></script>
    <style>
        /* Scrollbar Stealth */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
        
        /* Remove setas de input number */
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        body { background-color: #09090b; color: #f8fafc; }
        
        /* Glassmorphism Classes */
        .glass-panel { background: rgba(9, 9, 11, 0.7); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        
        /* Animações Globais */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .circle-progress { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round; }
    </style>
</head>
<body class="flex h-screen overflow-hidden selection:bg-indigo-500/30 selection:text-white relative">

    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-emerald-600/5 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-20 lg:w-64 bg-[#09090b]/90 border-r border-white/5 flex flex-col z-20 backdrop-blur-2xl transition-all">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-white/5">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                <i class="fas fa-gem text-sm"></i>
            </div>
            <div class="hidden lg:block ml-3">
                <h1 class="text-sm font-black tracking-tight text-white leading-none">Sóstrass</h1>
                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mt-0.5">PIM Enterprise</p>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 flex flex-col gap-2">
            <p class="hidden lg:block text-[10px] font-black text-slate-600 uppercase tracking-widest mb-2 px-4">Operacional</p>
            <a href="cockpit.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition group"><i class="fas fa-chart-line text-lg group-hover:scale-110 transition-transform"></i><span class="hidden lg:block text-xs font-bold">Cockpit</span></a>
            <a href="index.html" class="flex items-center gap-4 px-4 py-3 bg-white/5 text-white rounded-xl border border-white/10 shadow-inner group"><i class="fas fa-box-open text-indigo-400 text-lg group-hover:rotate-12 transition-transform"></i><span class="hidden lg:block text-xs font-bold">Editor de Ficha</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 relative z-10 bg-transparent">
        
        <header class="glass-panel h-20 px-8 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-5 w-full max-w-3xl">
                <a href="index.html" class="w-10 h-10 rounded-xl border border-white/10 bg-black/20 flex items-center justify-center text-slate-400 hover:bg-white/10 hover:text-white transition-all shadow-inner"><i class="fas fa-arrow-left"></i></a>
                
                <div class="flex flex-col">
                    <div class="flex items-center gap-3">
                        <span class="px-2 py-0.5 bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 rounded text-[9px] font-black uppercase tracking-widest shadow-[0_0_10px_rgba(99,102,241,0.2)]">Modo Edição</span>
                        <span class="text-[10px] text-slate-400 font-bold" id="status-sync"><i class="fas fa-cloud text-slate-600"></i> Rascunho Local</span>
                    </div>
                    <div class="flex items-center gap-3 mt-1">
                        <input type="text" id="hdr-nome" class="bg-transparent border-none outline-none text-2xl font-black text-white w-[500px] placeholder:text-slate-700 transition" value="Kit 30 Caixas Organizadoras (30 Divisórias)" onchange="sincronizarHeaders()">
                        <button onclick="chamarIA('hdr-nome')" class="text-indigo-500 hover:text-indigo-400 transition" title="Gerar com IA"><i class="fas fa-wand-magic-sparkles"></i></button>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <span class="text-[11px] font-mono font-bold text-slate-500 bg-black/40 px-3 py-2 rounded-lg border border-white/5 flex items-center gap-2">SKU: <span id="lbl-sku" class="text-white">CX-ORG-30</span></span>
                <button onclick="salvarRascunho()" class="px-6 py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl text-xs font-bold transition-all border border-white/10 flex items-center gap-2"><i class="fas fa-save text-slate-400"></i> Salvar</button>
                <button onclick="enviarBling()" class="px-6 py-2.5 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white rounded-xl text-xs font-black shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all transform hover:-translate-y-0.5 flex items-center gap-2"><i class="fas fa-cloud-upload-alt"></i> Atualizar Bling</button>
            </div>
        </header>

        <div class="px-10 py-4 bg-[#09090b]/90 backdrop-blur-md border-b border-white/5 flex gap-3 overflow-x-auto z-30 relative">
            <button onclick="carregarAba('produto')" id="tab-produto" class="px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-[0_0_15px_rgba(99,102,241,0.4)]"><i class="fas fa-tags mr-1.5 opacity-80"></i> Cadastro & SEO</button>
            <button onclick="carregarAba('precificacao')" id="tab-precificacao" class="px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-white hover:bg-white/5"><i class="fas fa-calculator mr-1.5 opacity-80"></i> Preços & Marketplaces</button>
            <button onclick="carregarAba('estudio')" id="tab-estudio" class="px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-white hover:bg-white/5"><i class="fas fa-images mr-1.5 opacity-80"></i> Mídia & Estúdio IA</button>
        </div>

        <main id="app-container" class="flex-1 overflow-y-auto p-8 lg:p-12 scroll-smooth">
            <div class="flex flex-col items-center justify-center h-full text-indigo-500/50">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p class="text-xs font-black uppercase tracking-widest">Iniciando Módulo...</p>
            </div>
        </main>
    </div>

    <script>
        function sincronizarHeaders() {
            const hNome = document.getElementById('hdr-nome').value;
            const inpNome = document.getElementById('inp-prod-nome');
            if(inpNome) { inpNome.value = hNome; validarFormulario(); }
        }

        // Roteador de Abas
        function carregarAba(aba) {
            // Estilização das Pílulas (Tabs)
            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.className = "px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 hover:text-white hover:bg-white/5";
            });
            const btn = document.getElementById(`tab-${aba}`);
            if(btn) btn.className = "px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-[0_0_15px_rgba(99,102,241,0.4)]";

            const container = document.getElementById('app-container');

            // Renderiza o módulo correto
            if (aba === 'produto') {
                if (typeof renderAbaProduto === 'function') {
                    container.innerHTML = renderAbaProduto();
                    validarFormulario(); // Dispara o cálculo de SEO inicial
                } else {
                    container.innerHTML = '<p class="text-rose-500">Erro: aba-produto.js não carregado.</p>';
                }
            } else if (aba === 'estudio') {
                container.innerHTML = typeof renderAbaEstudio === 'function' ? renderAbaEstudio() : '<p class="text-rose-500">Módulo Estudio não encontrado.</p>';
            } else if (aba === 'precificacao') {
                container.innerHTML = typeof renderAbaPrecificacao === 'function' ? renderAbaPrecificacao() : '<p class="text-rose-500">Módulo Precificação não encontrado.</p>';
                if(typeof dispararCalculadora === 'function') dispararCalculadora();
            }
        }

        // Simulações de Ação do Topbar
        function salvarRascunho() {
            if(typeof toast === 'function') toast("Rascunho salvo localmente.", false);
        }
        function enviarBling() {
            document.getElementById('status-sync').innerHTML = '<i class="fas fa-spinner fa-spin text-amber-400"></i> Enviando API...';
            setTimeout(() => {
                document.getElementById('status-sync').innerHTML = '<i class="fas fa-circle text-[8px] text-emerald-400"></i> 100% Sincronizado';
                if(typeof toast === 'function') toast("Atualizado no Bling com Sucesso!", false);
            }, 1500);
        }

        window.onload = () => { carregarAba('produto'); };
    </script>
</body>
</html>
